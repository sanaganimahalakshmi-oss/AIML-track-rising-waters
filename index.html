<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🌊 Flood Prediction System</h1>
    <p>Enter the weather details below</p>

    <form action="/predict" method="POST">

        <label>Annual Rainfall (mm)</label>
        <input type="number" name="annual_rainfall" required>

        <label>Seasonal Rainfall (mm)</label>
        <input type="number" name="seasonal_rainfall" required>

        <label>Temperature (°C)</label>
        <input type="number" name="temperature" required>

        <label>Humidity (%)</label>
        <input type="number" name="humidity" required>

        <label>River Level (m)</label>
        <input type="number" step="0.1" name="river_level" required>

        <label>Soil Moisture (%)</label>
        <input type="number" name="soil_moisture" required>

        <label>Wind Speed (km/h)</label>
        <input type="number" name="wind_speed" required>

        <label>Pressure (hPa)</label>
        <input type="number" name="pressure" required>

        <label>Visibility (km)</label>
        <input type="number" name="visibility" required>

        <label>Cloud Cover (%)</label>
        <input type="number" name="cloud_cover" required>

        <button type="submit">Predict Flood Risk</button>

    </form>

</div>

</body>
</html>
